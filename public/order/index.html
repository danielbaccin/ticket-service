<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Comprar Ingresso</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
    margin: 0;
    background: linear-gradient(
        180deg,
        #020617 0%,
        #0f172a 40%,
        #020617 100%
      );
      color: #fff;

      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      border-radius: 16px;

      background: #111827;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 22px;
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
      font-size: 14px;
    }

    input::placeholder {
      color: #9ca3af;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #052e16;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
    }

    .success {
      margin-top: 12px;
      text-align: center;
      color: #4ade80;
      font-size: 14px;
    }

    .error {
      margin-top: 12px;
      text-align: center;
      color: #f87171;
      font-size: 14px;
    }
    @media (max-width: 480px) {
    .container {
      align-items: flex-start; /* 👈 melhor no mobile */
      padding-top: 32px;
    }

    .card {
      padding: 20px;
    }
    body {
      padding: 24px 12px; /* menos espaço lateral */
    }

    h1 {
      font-size: 18px;
    }

    input, select, button {
      font-size: 16px; /* evita zoom no iPhone */
    }
  }
  .container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center; /* 👈 centraliza bonito */
    padding: 20px;
  }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <img src="/logo.png" alt="Logo" style="width: 80px; display: block; margin: 0 auto 12px;" />
      <h1>🎟️ Comprar ingresso</h1>

      <form id="formVenda">
        <input name="buyer_name" placeholder="Seu nome" required />
        <input name="buyer_email" type="email" placeholder="Seu email" required />
        <input name="telefone" placeholder="WhatsApp" required />

        <select name="ticket_type_id"></select>

        <input type="number" name="quantidade" value="1" min="1" />

        <div id="total" style="margin-bottom: 12px; font-size: 14px;"></div>

        <div id="resumo" style="margin-bottom: 12px; font-size: 13px; color: #9ca3af;"></div>
        <button id="btnSubmit" type="submit">Reservar ingresso</button>
      </form>

      <div id="msg"></div>
    </div>
  </div>

</body>

  <script>
    const form = document.getElementById('formVenda');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      msg.innerHTML = '';
      btn.innerText = 'Processando...';
      btn.disabled = true;

      const formData = new FormData(form);
      console.log('FormData:', Object.fromEntries(formData.entries()));

      const data = {
        event_id: "11111111-1111-1111-1111-111111111111",
        buyer_name: formData.get('buyer_name'),
        buyer_email: formData.get('buyer_email'),
        tickets: Array.from({ length: Number(formData.get('quantidade')) }).map(() => ({
          ticket_type_id: formData.get('ticket_type_id'),
          holder_name: formData.get('buyer_name')
        }))
      };
      console.log('Data to send:', data);

      try {
        // 1. cria pedido
        const orderRes = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!orderRes.ok) throw new Error('Erro ao criar pedido');
        console.log('Pedido criado com sucesso, processando resposta...');

        const order = await orderRes.json();

        // ⚠️ precisa garantir que vem isso do backend
        const orderId = order.id;
        console.log('ID do pedido criado:', orderId);

        // 2. cria pagamento
        const paymentRes = await fetch('/api/payments/pix', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId })
        });

        if (!paymentRes.ok) throw new Error('Erro ao gerar pagamento');
        console.log('Pagamento gerado com sucesso, processando resposta...');

        const payment = await paymentRes.json();

        console.log('payment:', payment);

        // 3. redirect
        window.location.href = payment.checkout_url;

      } catch (err) {
        console.error(err);
        btn.innerText = 'Reservar ingresso';
        btn.disabled = false;
        msg.innerHTML = '<div class="error">Erro ao processar pagamento</div>';
      }
    });

   let ticketTypes = [];

    window.addEventListener('DOMContentLoaded', () => {

      async function loadTicketTypes() {
        const res = await fetch('/api/ticket-types');
        ticketTypes = await res.json();

        const select = document.querySelector('[name="ticket_type_id"]');

        select.innerHTML = ticketTypes.map(t => `
          <option value="${t.id}">
            ${t.name} - R$ ${t.price}
          </option>
        `).join('');

        atualizarTotal();
      }

      function atualizarTotal() {
        const tipoId = document.querySelector('[name="ticket_type_id"]').value;
        const qtd = Number(document.querySelector('[name="quantidade"]').value);

        const tipo = ticketTypes.find(t => t.id === tipoId);

        if (!tipo) return;

        const total = tipo.price * qtd;

        document.getElementById('total').innerHTML =
          `<strong>Total: R$ ${total}</strong>`;

        document.getElementById('resumo').innerHTML =
          `${qtd}x ${tipo.name}`;
      }

      document.querySelector('[name="ticket_type_id"]').addEventListener('change', atualizarTotal);
      document.querySelector('[name="quantidade"]').addEventListener('input', atualizarTotal);

      loadTicketTypes();
    });
  </script>
</html>
