<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Comprar Ingresso</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;

    }

    .card {
      background: #111827;
      padding: 24px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 22px;
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
      font-size: 14px;
    }

    input::placeholder {
      color: #9ca3af;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #052e16;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
    }

    .success {
      margin-top: 12px;
      text-align: center;
      color: #4ade80;
      font-size: 14px;
    }

    .error {
      margin-top: 12px;
      text-align: center;
      color: #f87171;
      font-size: 14px;
    }
    @media (max-width: 480px) {
    .card {
      padding: 20px;
      border-radius: 12px;
    }

    h1 {
      font-size: 18px;
    }

    input, select, button {
      font-size: 16px; /* evita zoom no iPhone */
    }
  }
  </style>
</head>
<body>
<img src="/logo.png" alt="Logo" style="width: 80px; display: block; margin: 0 auto 12px;" />
  <div class="card">
    <h1>🎟️ Comprar ingresso</h1>

    <form id="formVenda">
      <input name="buyer_name" placeholder="Seu nome" required />
      <input name="buyer_email" type="email" placeholder="Seu email" required />
      <input name="telefone" placeholder="WhatsApp" required />

      <select name="ticket_type_id">
        <option value="1">Inteira</option>
        <option value="2">Meia</option>
      </select>

      <input type="number" name="quantidade" value="1" min="1" />

      <div id="total" style="margin-bottom: 12px; font-size: 14px;"></div>
      <button id="btnSubmit" type="submit">Reservar ingresso</button>
    </form>

    <div id="msg"></div>
  </div>

  <script>
    const form = document.getElementById('formVenda');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      msg.innerHTML = '';

      const formData = new FormData(form);

      const data = {
        event_id: "11111111-1111-1111-1111-111111111111",
        buyer_name: formData.get('buyer_name'),
        buyer_email: formData.get('buyer_email'),
        tickets: Array.from({ length: Number(formData.get('quantidade')) }).map(() => ({
          ticket_type_id: formData.get('ticket_type_id'),
          holder_name: formData.get('buyer_name')
        }))
      };

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) throw new Error();

        msg.innerHTML = '<div class="success">Ingresso reservado com sucesso 🎉</div>';
        window.location.href = '/sucesso.html';

      } catch (err) {
        msg.innerHTML = '<div class="error">Erro ao criar pedido</div>';
      }
    });
    const totalDiv = document.getElementById('total');

  function atualizarTotal() {
      const tipo = document.querySelector('[name="ticket_type_id"]').value;
      const qtd = Number(document.querySelector('[name="quantidade"]').value);

      const preco = tipo === '1' ? 50 : 25;

      totalDiv.innerHTML = `Total: R$ ${preco * qtd}`;
    }

    document.querySelector('[name="ticket_type_id"]').addEventListener('change', atualizarTotal);
    document.querySelector('[name="quantidade"]').addEventListener('input', atualizarTotal);

    atualizarTotal();
    const btn = document.getElementById('btnSubmit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      btn.innerText = 'Processando...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (!res.ok) throw new Error();

        window.location.href = '/sucesso.html';

      } catch (err) {
        btn.innerText = 'Reservar ingresso';
        btn.disabled = false;
        msg.innerHTML = '<div class="error">Erro ao criar pedido</div>';
      }
    });
  </script>

</body>
</html>
